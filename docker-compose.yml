# ─────────────────────────────────────────────────────────────────
# Unimed Fortaleza 360° — Stack completa
#   • postgres-dw       : Data Warehouse (star schema)
#   • postgres-airflow  : Metadata do Airflow
#   • airflow-init      : inicialização do Airflow (roda uma vez)
#   • airflow-webserver : UI do Airflow
#   • airflow-scheduler : agendador das DAGs
# -----------------------------------------------------------------
# Uso rápido:
#   cp .env.example .env && docker compose up -d
# ─────────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${AIRFLOW_USER}:${AIRFLOW_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    PYTHONPATH: /opt/airflow/src
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres-airflow:
      condition: service_healthy
    postgres-dw:
      condition: service_healthy
  networks:
    - unimed-net

services:
  # ── Data Warehouse ──────────────────────────────────────────────
  postgres-dw:
    image: postgres:16-alpine
    container_name: unimed_dw
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DW_DB:-unimed_dw}
      POSTGRES_USER: ${DW_USER:-dw_user}
      POSTGRES_PASSWORD: ${DW_PASSWORD:-dw_password}
    ports:
      - "5432:5432"
    volumes:
      - pg_dw_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DW_USER:-dw_user} -d ${DW_DB:-unimed_dw}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unimed-net

  # ── Airflow Metadata DB ─────────────────────────────────────────
  postgres-airflow:
    image: postgres:16-alpine
    container_name: unimed_airflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AIRFLOW_DB:-airflow}
      POSTGRES_USER: ${AIRFLOW_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
    ports:
      - "5433:5432"
    volumes:
      - pg_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_USER:-airflow} -d ${AIRFLOW_DB:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unimed-net

  # ── Airflow Init (roda uma única vez) ───────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: unimed_airflow_init
    command: bash -c "airflow db migrate && airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@unimed.local --password admin"
    restart: "no"

  # ── Airflow Webserver ───────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: unimed_airflow_web
    command: airflow webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Airflow Scheduler ───────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: unimed_airflow_scheduler
    command: airflow scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  pg_dw_data:
  pg_airflow_data:

networks:
  unimed-net:
    driver: bridge